# Nginx config for Government IMS (production server)
# Copy to /etc/nginx/sites-available/ and enable, or include in your server block.
# Replace /home/frank/inv with the actual path to the app on the server.
#
# IMPORTANT: "try_files $uri $uri/ /index.html" is required. Without it, opening
# or refreshing a path like /dashboard or /stores/items returns 404 (Route/Page not found).

server {
    listen 80;
    server_name inventory.health.go.ug;   # or your server IP/hostname

    # Serve frontend static files (run "npm run build" in ~/inv so this directory exists)
    root /home/frank/inv/frontend/dist;
    index index.html;

    # SPA: MUST use try_files so /dashboard, /stores/items, etc. return index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Proxy API to Node backend (must be running on port 3000)
    location /api {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
